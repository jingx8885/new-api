name: Publish Docker image (jingxu)

'on':
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to publish, for example latest or gpt55'
        required: true
        default: latest
        type: string
      push_latest:
        description: 'Also push latest tag'
        required: true
        default: true
        type: boolean

concurrency:
  group: docker-image-jingxu-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: jingxu888512321/new-api

jobs:
  build-single-arch:
    name: Build and push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if ! [[ "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $TAG" >&2
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "$TAG" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=jingxu-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=jingxu-${{ matrix.arch }}
          provenance: false
          sbom: false

  create-manifest:
    name: Create multi-arch manifest
    needs: [build-single-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if ! [[ "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $TAG" >&2
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create requested tag manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }} \
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}-arm64

      - name: Create latest manifest
        if: ${{ inputs.push_latest }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

      - name: Summary
        run: |
          echo '### Published Docker image' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}' >> "$GITHUB_STEP_SUMMARY"
          if [ '${{ inputs.push_latest }}' = 'true' ]; then
            echo '${{ env.IMAGE_NAME }}:latest' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
