name: Publish Docker image (jingxu)

'on':
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to publish, for example latest or gpt55'
        required: true
        default: latest
        type: string
      push_latest:
        description: 'Also push latest tag'
        required: true
        default: true
        type: boolean

concurrency:
  group: docker-image-jingxu-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: jingxu888512321/new-api

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            PUSH_LATEST="${{ inputs.push_latest }}"
          else
            TAG="main-${GITHUB_SHA::7}"
            PUSH_LATEST="true"
          fi

          if ! [[ "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $TAG" >&2
            exit 1
          fi

          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:${TAG}"
            if [ "$PUSH_LATEST" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "$TAG" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Summary
        run: |
          echo '### Published Docker image' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.tags.outputs.tags }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
